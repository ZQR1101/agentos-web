name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: MCP contract test
        run: npm run test:mcp

      - name: Task Store concurrency test
        run: npm run test:store

      - name: Harness budget test
        run: npm run test:harness

      - name: Skill contract test
        run: npm run test:skills

      - name: Tool policy test
        run: npm run test:tools

      - name: Runtime health test
        run: npm run test:health

      - name: Source diversity test
        run: npm run test:source

      - name: Background workflow test
        run: npm run test:workflow

      - name: SSE task event test
        run: npm run test:events

      - name: Workflow end-to-end test
        run: npm run test:e2e

      - name: Queue mode test
        run: npm run test:queue

      - name: Model observability test
        run: npm run test:observability

      - name: Source Policy safety evaluation
        run: npm run eval:safety

      - name: Production build
        run: npm run build
